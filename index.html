<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Тренерская — система создания и развития сильных команд</title>
<style>
:root{
 --bg:#f2f4f9; --card:#ffffff; --ink:#1c2333; --muted:#6b7385; --line:#e5e8f0;
 --brand:#4f46e5; --brand2:#7c5cff; --amber:#f2a52a; --teal:#19b789;
 --vlow:#dc2626; --low:#f97316; --mid:#94a3b8; --high:#22c55e; --vhigh:#15803d;
 --r:14px; --shadow:0 1px 3px rgba(28,35,51,.08),0 8px 24px rgba(28,35,51,.06);
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{background:var(--bg);color:var(--ink);font:15px/1.55 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif}
.wrap{max-width:980px;margin:0 auto;padding:18px 20px 60px}
header.top{background:linear-gradient(120deg,#4f46e5,#7c5cff 60%,#9333ea);color:#fff;box-shadow:var(--shadow)}
header.top .wrap{padding:16px 20px;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.logo{font-size:20px;font-weight:800;letter-spacing:.4px;cursor:pointer}
.logo small{display:block;font-size:11px;font-weight:500;opacity:.85;letter-spacing:.2px}
nav{margin-left:auto;display:flex;gap:8px}
nav button{background:rgba(255,255,255,.14);border:1px solid rgba(255,255,255,.25);color:#fff;padding:8px 14px;border-radius:10px;cursor:pointer;font-size:14px}
nav button:hover{background:rgba(255,255,255,.25)}
h1{font-size:24px;margin:18px 0 6px}
h2{font-size:19px;margin:26px 0 10px}
h3{font-size:16px;margin:18px 0 8px}
.sub{color:var(--muted);margin:0 0 18px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px}
.card{background:var(--card);border-radius:var(--r);box-shadow:var(--shadow);padding:18px}
.tcard{cursor:pointer;transition:transform .12s ease, box-shadow .12s ease;border-top:4px solid var(--brand)}
.tcard:hover{transform:translateY(-2px);box-shadow:0 4px 10px rgba(28,35,51,.12),0 14px 34px rgba(28,35,51,.10)}
.tcard .tag{font-size:12px;color:var(--muted);margin-top:2px}
.tcard h3{margin:0 0 4px}
.tcard p{font-size:13px;color:var(--muted);margin:8px 0 0}
.badge{display:inline-block;font-size:11px;font-weight:700;padding:2px 9px;border-radius:99px;letter-spacing:.2px}
.z-vlow{background:#fee2e2;color:#b91c1c}.z-low{background:#ffedd5;color:#c2410c}
.z-mid{background:#eef1f6;color:#475569}.z-high{background:#dcfce7;color:#15803d}.z-vhigh{background:#bbf7d0;color:#14532d}
.btn{display:inline-block;background:var(--brand);border:none;color:#fff;padding:11px 20px;border-radius:11px;font-size:15px;font-weight:600;cursor:pointer}
.btn:hover{filter:brightness(1.08)}
.btn.sec{background:#eef1f6;color:var(--ink)}
.btn.warn{background:#fee2e2;color:#b91c1c}
.btn.sm{padding:6px 12px;font-size:13px;border-radius:9px}
.btn:disabled{opacity:.45;cursor:not-allowed}
input[type=text],input[type=email],textarea,select{width:100%;padding:10px 12px;border:1px solid var(--line);border-radius:10px;font:inherit;background:#fff;color:var(--ink)}
textarea{min-height:74px;resize:vertical}
label.f{display:block;font-size:13px;font-weight:600;margin:14px 0 5px;color:#3b4356}
.q{background:var(--card);border-radius:var(--r);box-shadow:var(--shadow);padding:16px 18px;margin:12px 0}
.q .qt{font-weight:600;margin-bottom:10px}
.q .qn{color:var(--brand);font-weight:800;margin-right:6px}
.opts{display:flex;gap:8px;flex-wrap:wrap}
.opt{border:1.5px solid var(--line);background:#fbfcfe;padding:8px 16px;border-radius:99px;cursor:pointer;font-size:14px;user-select:none}
.opt:hover{border-color:#b9c0d4}
.opt.on{background:var(--brand);border-color:var(--brand);color:#fff;font-weight:600}
.opts.vert{flex-direction:column}
.opts.vert .opt{border-radius:10px}
.pbar{position:sticky;top:0;z-index:5;background:var(--bg);padding:10px 0 6px}
.pbar .track{height:8px;background:#e3e7f0;border-radius:99px;overflow:hidden}
.pbar .fill{height:100%;background:linear-gradient(90deg,var(--brand),var(--brand2));border-radius:99px;transition:width .2s}
.pbar .meta{display:flex;justify-content:space-between;font-size:12.5px;color:var(--muted);margin-top:5px}
.timer{font-weight:800;color:var(--brand)}
.timer.hot{color:var(--vlow)}
.navrow{display:flex;gap:10px;justify-content:space-between;margin:18px 0}
.chartbox{background:var(--card);border-radius:var(--r);box-shadow:var(--shadow);padding:16px;margin:14px 0;overflow-x:auto}
.chartbox svg{display:block;margin:0 auto;max-width:100%}
.icard{border-left:4px solid var(--mid)}
.icard.z-vlow,.icard.z-low{border-left-color:var(--low)}
.icard.z-high,.icard.z-vhigh{border-left-color:var(--high)}
.icard .hd{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:6px}
.icard .val{font-weight:800;font-size:17px}
.icard .pair{font-size:12px;color:var(--muted)}
.icard p{margin:7px 0;font-size:14px}
.icard .wt{background:#f7f8fc;border-radius:10px;padding:10px 12px}
.icard .wt b{color:var(--brand)}
.sumrow{display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:12px;margin:12px 0}
.sumrow .card{padding:14px}
.sumrow h4{margin:0 0 8px;font-size:13.5px;text-transform:uppercase;letter-spacing:.4px;color:var(--muted)}
.sumrow ul{margin:0;padding-left:18px;font-size:14px}
.alertbox{border-radius:12px;padding:12px 14px;font-size:14px;margin:10px 0}
.alertbox.red{background:#fee2e2;color:#991b1b}
.alertbox.amb{background:#fef3c7;color:#92400e}
.alertbox.grn{background:#dcfce7;color:#166534}
table.hist{width:100%;border-collapse:collapse;background:var(--card);border-radius:var(--r);box-shadow:var(--shadow);overflow:hidden}
table.hist th,table.hist td{padding:10px 12px;text-align:left;font-size:14px;border-bottom:1px solid var(--line)}
table.hist th{background:#f7f8fc;font-size:12.5px;text-transform:uppercase;letter-spacing:.3px;color:var(--muted)}
table.hist tr:last-child td{border-bottom:none}
.rhead{display:flex;justify-content:space-between;align-items:flex-start;gap:14px;flex-wrap:wrap}
.rhead .who b{font-size:18px}
.rhead .who div{color:var(--muted);font-size:13.5px}
.toolrow{display:flex;gap:8px;flex-wrap:wrap;margin:14px 0}
.qa{border-bottom:1px dashed var(--line);padding:10px 0}
.qa .ans{background:#f7f8fc;border-radius:8px;padding:8px 10px;margin-top:6px;font-size:14px;white-space:pre-wrap}
.qa .score select{width:auto;padding:6px 10px}
.muted{color:var(--muted)}
.small{font-size:12.5px}
.center{text-align:center}
footer{margin-top:40px;color:var(--muted);font-size:12.5px;text-align:center}
.tiles{display:grid;grid-template-columns:repeat(auto-fill,minmax(158px,1fr));gap:10px;margin:12px 0}
.tile{background:var(--card);border-radius:12px;box-shadow:var(--shadow);padding:12px;cursor:pointer;transition:transform .1s}
.tile:hover{transform:translateY(-2px)}
.tile h5{margin:0 0 6px;font-size:11px;text-transform:uppercase;letter-spacing:.4px;color:var(--muted)}
.tile .big{font-size:23px;font-weight:800;color:var(--ink);line-height:1.1}
.tile.off{opacity:.55;cursor:default}
.stageb{display:inline-block;font-size:11px;font-weight:700;padding:3px 10px;border-radius:99px}
.st-candidate{background:#fef3c7;color:#92400e}.st-onboarding{background:#dbeafe;color:#1d4ed8}.st-staff{background:#dcfce7;color:#15803d}.st-rejected{background:#fee2e2;color:#b91c1c}
.tl{list-style:none;margin:0;padding:0}
.tl li{position:relative;padding:0 0 14px 22px;border-left:2px solid var(--line);margin-left:8px}
.tl li:before{content:"";position:absolute;left:-6px;top:3px;width:10px;height:10px;border-radius:99px;background:var(--brand)}
.tl li:last-child{padding-bottom:2px}
.tl .d{font-size:11.5px;color:var(--muted)}
.pipe{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:10px}
.pipe .card{cursor:pointer;text-align:center;border-top:4px solid var(--brand)}
.pipe .num{font-size:34px;font-weight:800;color:var(--brand)}
.nps10{display:flex;gap:6px;flex-wrap:wrap}
.nps10 .opt{min-width:42px;text-align:center;font-weight:700}
.print-only{display:none}
@media print{
 .print-only{display:block}
 body{background:#fff}
 header.top,nav,.no-print,footer{display:none !important}
 .wrap{max-width:100%;padding:0}
 .card,.chartbox,.q{box-shadow:none;border:1px solid #ddd;break-inside:avoid}
 .pagebreak{break-before:page}
}
</style>
</head>

function paeiLetter(v,code){return v>=65?code.toUpperCase():v>=35?code.toLowerCase():"-";}
function scorePaei(a){ // a: 40 значений 0=Да,1=Иногда,2=Нет
 const raw=[0,0,0,0];
 a.forEach((v,i)=>{raw[i%4]+=2-v;});
 const sc=raw.map(r=>r*5);
 const code=sc.map((v,i)=>paeiLetter(v,PAEI_STYLES[i].code)).join("");
 const caps=sc.map(v=>v>=65);
 const capCount=caps.filter(Boolean).length;
 let dominant=0;sc.forEach((v,i)=>{if(v>sc[dominant])dominant=i;});
 const pair=sc.map((v,i)=>[v,i]).sort((x,y)=>y[0]-x[0]).slice(0,2).map(x=>x[1]).sort();
 const comboKey=PAEI_STYLES[pair[0]].code+PAEI_STYLES[pair[1]].code;
 return {sc,code,dominant,capCount,deadwood:sc.every(v=>v<35),
  combo:(sc[pair[0]]>=50&&sc[pair[1]]>=50)?PAEI_COMBOS[comboKey]||null:null,
  warn:capCount>=3?"Три и более доминирующих стиля одновременно — редкость; вероятна социальная желательность ответов. Перепроверьте на интервью.":null};
}

function scoreArch(a){ // a: 72 значения-индекса 0..4 (1..5 баллов)
 const sums=Array(12).fill(0);
 a.forEach((v,i)=>{sums[i%12]+=v+1;});

 const top=sums.map((v,i)=>v===max?i:-1).filter(i=>i>=0);

 let motivation=0;groups.forEach((v,i)=>{if(v>groups[motivation])motivation=i;});
 const domCount=sums.filter(v=>v>=26).length;
 return {sums,top,groups,motivation,
  flat:domCount>=6?"Шесть и более «доминирующих» архетипов — профиль сглажен завышенными ответами; вероятна социальная желательность.":null};

const _REVVOVL=i=>(i>=24&&i<=35)||(i>=60&&i<=71);
function genVovl(t,honest){ // t: 12 целевых баллов 0..10; honest: true → ловушки «не согласен»
 const a=Array(88).fill(0);
 for(let s=0;s<12;s++){let sum=Math.round((t[s]/2.5+1)*7);
  for(let k=0;k<7;k++){const idx=k*12+s;const left=6-k;

function scoreGrani(a){ // a: 200 значений 0=Да,1=Не знаю,2=Нет
 const revDec=new Set([2,5,7,10,12,14,17,19]);
 const raw=Array(10).fill(0);
 a.forEach((v,i)=>{const rev=revDec.has(Math.floor(i/10));let p=2-v;if(rev)p=v;raw[i%10]+=p;});
 const std=raw.map(r=>(r-20)*5);
 const yes=q=>a[q-1]===0;
 const molB=[72,102,172].filter(yes).length>=2;
 const molE=[55,105,175].filter(yes).length>=2;
 const maybeCount=a.filter(v=>v===1).length;
 const compulsive=std.map((v,i)=>v>=90?i:-1).filter(i=>i>=0);
 const syndromes=GRANI_SYNDROMES.filter(s=>s.test(std));
 return {std,molB,molE,pin:molB&&molE,maybeCount,unreliable:maybeCount>50,dLow:std[3]<=-32,compulsive,synIds:syndromes.map(s=>s.id)};
}
function scoreSale(a){ // a: 120 значений 0=Да,1=Иногда,2=Нет
 const rev=i=>(i>=24&&i<=35)||(i>=60&&i<=71)||(i>=96&&i<=107);
 const raw=Array(12).fill(0);
 a.forEach((v,i)=>{let p=2-v;if(rev(i))p=v;raw[i%12]+=p;});
 const sc=raw.map(r=>r*5);
 const diff=sc[10]-sc[11];
 let type=null;
 if(sc[10]>=61&&sc[11]>=61&&Math.abs(diff)<20)type="universal";
 else if(diff>=20)type="hunter";else if(diff<=-20)type="farmer";
 else if(sc[10]<40&&sc[11]<40)type="weak";
 return {sc,type,flags:{lowResult:sc[5]<=40,lowLoyal:sc[3]<=40,chaos:sc[0]<=40&&sc[7]<=40}};
}
function scoreVovl(a){ // a: 88 значений-индексов 0..4 (0=полностью не согласен … 4=полностью согласен)
 const rev=i=>(i>=24&&i<=35)||(i>=60&&i<=71);
 const sums=Array(12).fill(0);
 for(let i=0;i<84;i++){let v=a[i]+1;if(rev(i))v=6-v;sums[i%12]+=v;}
 const sc=sums.map(s=>Math.round((s/7-1)*2.5*10)/10);
 const index=Math.round(sc.reduce((x,y)=>x+y,0)/12*10)/10;
 const lie=[84,85,86,87].filter(i=>a[i]>=3).length; // «скорее согласен» и выше
 const battery=[100,75,50,25,25][lie];
 const patterns=VOVL_PATTERNS.filter(p=>p.test(sc)).map(p=>p.d);
 return {sc,index,lie,battery,patterns};
}

 a.forEach((v,i)=>{if(v!==null&&v===LOGIKA_Q[i].c){correct++;sections[Math.floor(i/20)]++;}});
 const iq=60+correct;

 return {correct,iq,band:band.label,sections,answered:a.filter(v=>v!==null).length};
}

function renderForm(testId,empId){
 const t=TESTS[testId];
 const emp=empId?getEmp(empId):null;
 show(`<h1>${t.name}</h1><p class="sub">${t.tag}</p>
 <div class="card"><h3>Инструкция</h3><p>${t.instr}</p></div>
 <div class="card" style="margin-top:14px">
  ${emp?`<p>Тест проходит: <b>${esc(emp.name)}</b>${emp.pos?" · "+esc(emp.pos):""}</p>`:`
  <label class="f">ФИО респондента *</label><input type="text" id="f_name" placeholder="Иванов Иван Иванович">

  <div style="margin-top:18px;display:flex;gap:10px">

function startTest(testId,empId){
 let resp;
 if(empId){const e=getEmp(empId);resp={name:e.name,pos:e.pos||"",mail:e.mail||""};}
 else{
  const name=$("#f_name").value.trim();
  if(!name){alert("Укажите ФИО респондента");return;}
  resp={name,pos:$("#f_pos").value.trim(),mail:$("#f_mail").value.trim()};
 }
 const t=TESTS[testId];
 S={test:testId,empId:empId||null,resp,
    answers:testId==="rez"?REZ_Q.map(()=>({choice:null,text:"",multi:[]})):Array(t.total).fill(null),
    page:0,timer:null,timeLeft:t.timeLimit||0,started:Date.now()};
 if(t.timeLimit){
  S.timer=setInterval(()=>{S.timeLeft--;const el=$("#tmr");
   if(el){el.textContent=fmtTime(S.timeLeft);if(S.timeLeft<=300)el.classList.add("hot");}
   if(S.timeLeft<=0){clearInterval(S.timer);S.timer=null;alert("Время вышло — тест завершается автоматически.");finishTest(true);}
  },1000);
 }
 renderQuiz();
}
const fmtTime=s=>{s=Math.max(0,s);return String(Math.floor(s/60)).padStart(2,"0")+":"+String(s%60).padStart(2,"0")};
// --- прохождение ---
function renderQuiz(){
 const t=TESTS[S.test];
 if(S.test==="rez")return renderRezQuiz();
 if(S.test==="enps")return renderEnpsQuiz();
 const from=S.page*t.pageSize,to=Math.min(from+t.pageSize,t.total);
 const answered=S.answers.filter(v=>v!==null).length;
 let qhtml="";
 for(let i=from;i<to;i++){
  const opts=S.test==="logika"?LOGIKA_Q[i].o:t.opts;
  const vert=t.vertical||S.test==="logika";
  qhtml+=`<div class="q"><div class="qt"><span class="qn">${i+1}.</span>${esc(getQ(S.test,i))}</div>
   <div class="opts${vert?" vert":""}">${opts.map((o,oi)=>
    `<div class="opt${S.answers[i]===oi?" on":""}" onclick="pick(${i},${oi},this)">${esc(o)}</div>`).join("")}</div></div>`;
 }
 const pages=Math.ceil(t.total/t.pageSize);
 const secName=S.test==="logika"?["Раздел 1. Вербальные задания","Раздел 2. Числовые задания","Раздел 3. Логические задания","Раздел 4. Абстрактные задания"][Math.floor(from/20)]:"";
 show(`<div class="pbar no-print"><div class="track"><div class="fill" style="width:${Math.round(answered/t.total*100)}%"></div></div>
  <div class="meta"><span>${t.name} — стр. ${S.page+1} из ${pages}</span>
  ${t.timeLimit?`<span>Осталось: <span class="timer${S.timeLeft<=300?" hot":""}" id="tmr">${fmtTime(S.timeLeft)}</span></span>`:""}
  <span>Отвечено: ${answered} / ${t.total}</span></div></div>
 ${secName?`<h2 style="margin-top:8px">${secName}</h2>`:""}
 ${qhtml}
 <div class="navrow">
  <button class="btn sec" ${S.page===0?"disabled":""} onclick="pg(-1)">← Назад</button>
  <button class="btn warn sm" onclick="abortTest()">Прервать</button>
  ${S.page<pages-1?`<button class="btn" onclick="pg(1)">Далее →</button>`:`<button class="btn" onclick="finishTest(false)">Завершить тест</button>`}
 </div>`);
}
function pick(i,oi,el){S.answers[i]=oi;
 const t=TESTS[S.test];
 // мгновенная подсветка без полного ререндера
 el.parentElement.querySelectorAll(".opt").forEach(x=>x.classList.remove("on"));
 el.classList.add("on");
 const answered=S.answers.filter(v=>v!==null).length;
 const f=$(".pbar .fill");if(f)f.style.width=Math.round(answered/t.total*100)+"%";
 const m=$(".pbar .meta span:last-child");if(m)m.textContent="Отвечено: "+answered+" / "+t.total;
}
function pg(d){
 const t=TESTS[S.test];
 if(d>0&&S.test!=="logika"){
  const from=S.page*t.pageSize,to=Math.min(from+t.pageSize,t.total);
  for(let i=from;i<to;i++)if(S.answers[i]===null){alert("Ответьте, пожалуйста, на все вопросы страницы (вопрос "+(i+1)+").");return;}
 }
 S.page+=d;renderQuiz();window.scrollTo(0,0);
}
function abortTest(){if(confirm("Прервать тест? Ответы не сохранятся."))go("home");}
function finishTest(force){
 const t=TESTS[S.test];
 if(S.test!=="rez"&&S.test!=="enps"){
  const un=S.answers.filter(v=>v===null).length;
  if(un>0&&!force){
   if(S.test==="logika"){if(!confirm("Без ответа осталось "+un+" вопросов — они будут засчитаны как неверные. Завершить?"))return;}
   else{alert("Остались вопросы без ответа: "+un+". Ответьте на все вопросы.");return;}
  }
 }
 if(S.timer){clearInterval(S.timer);S.timer=null;}
 let result=null;
 if(S.test==="grani")result=scoreGrani(S.answers);
 else if(S.test==="sale")result=scoreSale(S.answers);
 else if(S.test==="vovl")result=scoreVovl(S.answers);
 else if(S.test==="logika")result=scoreLogika(S.answers);
 else if(S.test==="paei")result=scorePaei(S.answers);
 else if(S.test==="arch")result=scoreArch(S.answers);
 else if(S.test==="enps")result=scoreEnps(S.answers);
 const rec={id:Date.now().toString(36)+Math.random().toString(36).slice(2,6),test:S.test,resp:S.resp,date:Date.now(),
  spent:Math.round((Date.now()-S.started)/1000),answers:S.answers,result,hr:{scores:{},note:""},empId:S.empId||null};
 const h=histAll();h.unshift(rec);setHistory(h);
 if(S.empId&&typeof logEvent==="function")logEvent(S.empId,"Пройден тест: "+TESTS[S.test].name);
 if(S.empId){const eid=S.empId;S.empId=null;renderThanks(eid);}
 else renderRecord(rec.id);
}

function renderRezQuiz(){
 const t=TESTS.rez,pages=Math.ceil(REZ_Q.length/t.pageSize);
 const from=S.page*t.pageSize,to=Math.min(from+t.pageSize,REZ_Q.length);
 let html="";let lastBlock="";
 for(let i=from;i<to;i++){
  const q=REZ_Q[i],a=S.answers[i];
  let inner="";
  if(q.type==="choicetext"||q.type==="choice"){
   inner+=`<div class="opts vert">`+q.options.map((o,oi)=>`<div class="opt${a.choice===oi?" on":""}" onclick="rzPick(${i},${oi})">${esc(o)}</div>`).join("")+`</div>`;
   if(q.type==="choicetext")inner+=`<textarea placeholder="Поясните / продолжите ответ…" oninput="S.answers[${i}].text=this.value">${esc(a.text)}</textarea>`;
  }else if(q.type==="multi"){
   inner+=`<div class="opts">`+q.options.map((o,oi)=>`<div class="opt${a.multi.includes(oi)?" on":""}" onclick="rzMulti(${i},${oi},${q.max})">${esc(o)}</div>`).join("")+`</div><div class="small muted" style="margin-top:6px">Выберите не более ${q.max}.</div>`;
  }else{
   inner+=`<textarea placeholder="Ваш ответ…" oninput="S.answers[${i}].text=this.value">${esc(a.text)}</textarea>`;
  }
  html+=(q.block!==lastBlock?`<h2>Блок ${q.block}</h2>`:"")+`<div class="q"><div class="qt"><span class="qn">${q.n}.</span>${esc(q.text)}</div>${inner}</div>`;
  lastBlock=q.block;
 }
 show(`<div class="pbar no-print"><div class="track"><div class="fill" style="width:${Math.round(from/REZ_Q.length*100)}%"></div></div>
 <div class="meta"><span>РЕЗУЛЬТАТИВ — стр. ${S.page+1} из ${pages}</span><span></span></div></div>
 ${html}
 <div class="navrow">
  <button class="btn sec" ${S.page===0?"disabled":""} onclick="rzPg(-1)">← Назад</button>
  <button class="btn warn sm" onclick="abortTest()">Прервать</button>
  ${S.page<pages-1?`<button class="btn" onclick="rzPg(1)">Далее →</button>`:`<button class="btn" onclick="finishTest(false)">Завершить</button>`}
 </div>`);
}
function rzPick(i,oi){S.answers[i].choice=oi;renderRezQuiz();}
function rzMulti(i,oi,max){const m=S.answers[i].multi;const p=m.indexOf(oi);
 if(p>=0)m.splice(p,1);else{if(m.length>=max){alert("Не более "+max+" вариантов");return;}m.push(oi);}renderRezQuiz();}
function rzPg(d){
 if(d>0){const t=TESTS.rez,from=S.page*t.pageSize,to=Math.min(from+t.pageSize,REZ_Q.length);
  for(let i=from;i<to;i++){const q=REZ_Q[i],a=S.answers[i];
   if((q.type==="choicetext"||q.type==="choice")&&a.choice===null){alert("Выберите вариант в вопросе "+q.n);return;}
   if(q.type==="multi"&&a.multi.length===0){alert("Выберите варианты в вопросе "+q.n);return;}
   if(q.type==="text"&&!a.text.trim()){alert("Заполните ответ на вопрос "+q.n);return;}}}
 S.page+=d;renderRezQuiz();window.scrollTo(0,0);
}

function graniChart(std,res){
 const W=760,H=420,L=64,R=700,T=26,B=326;
 const y=v=>T+(100-v)*(B-T)/200;
 const xs=GRANI_SCALES.map((s,i)=>L+((R-L)/10)*(i+0.5));
 const bands=[[68,100,"#f0fdf4"],[32,68,"#f7fee7"],[-32,32,"#f8fafc"],[-68,-32,"#fff7ed"],[-100,-68,"#fef2f2"]];
 let g=bands.map(b=>`<rect x="${L}" y="${y(b[1])}" width="${R-L}" height="${y(b[0])-y(b[1])}" fill="${b[2]}"/>`).join("");
 [[100,"+100"],[68,"+68"],[32,"+32"],[0,"0"],[-32,"−32"],[-68,"−68"],[-100,"−100"]].forEach(t=>{
  g+=`<line x1="${L}" y1="${y(t[0])}" x2="${R}" y2="${y(t[0])}" stroke="#e2e8f0" stroke-width="1"/><text x="${L-8}" y="${y(t[0])+4}" text-anchor="end" font-size="11" fill="#64748b">${t[1]}</text>`;});
 [["Очень выс.",84],["Высокий",50],["Средний",0],["Низкий",-50],["Оч. низкий",-84]].forEach(t=>{
  g+=`<text x="${R+6}" y="${y(t[1])+4}" font-size="10" fill="#94a3b8">${t[0]}</text>`;});
 g+=`<polyline points="${std.map((v,i)=>xs[i]+","+y(v)).join(" ")}" fill="none" stroke="#475569" stroke-width="2"/>`;
 std.forEach((v,i)=>{const s=GRANI_SCALES[i];const col=GRANI_BLOCKS[s.block].color;
  const mol=(i===1&&res.molB)||(i===4&&res.molE);
  g+=`<circle cx="${xs[i]}" cy="${y(v)}" r="7" fill="${col}" stroke="${i===3?"#1c2333":"#fff"}" stroke-width="${i===3?2.5:2}"><title>${s.code}. ${s.name}: ${v>0?"+":""}${v}</title></circle>`;
  g+=`<text x="${xs[i]}" y="${y(v)-12}" text-anchor="middle" font-size="11" font-weight="700" fill="#1c2333">${v>0?"+":""}${v}</text>`;
  if(mol)g+=`<text x="${xs[i]+10}" y="${y(v)-14}" font-size="15">⚡</text>`;
  if(res.compulsive.includes(i))g+=`<text x="${xs[i]-20}" y="${y(v)-14}" font-size="13">❗</text>`;
  g+=`<text x="${xs[i]}" y="${B+18}" text-anchor="middle" font-size="12" font-weight="800" fill="${col}">${s.code}</text>`;
  g+=`<text x="${xs[i]}" y="${B+31}" text-anchor="middle" font-size="8.5" fill="#64748b">${s.name}</text>`;});
 const leg=GRANI_BLOCKS.map((b,i)=>`<circle cx="${L+30+i*230}" cy="${H-14}" r="6" fill="${b.color}"/><text x="${L+42+i*230}" y="${H-10}" font-size="11.5" fill="#475569">${b.name} (${b.scales})</text>`).join("");
 return `<svg viewBox="0 0 ${W} ${H}" width="${W}">${g}${leg}</svg>`;
}

function reportGrani(rec){
 const r=rec.result;
 const lvl=v=>v<=-32?"low":v<32?"mid":"high";
 let cards="";
 GRANI_SCALES.forEach((s,i)=>{const v=r.std[i],z=zoneG(v),it=s[lvl(v)];
  let extra="";
  if(v<=-68)extra+=`<p class="small muted">Значение в зоне «очень низкий»: описанные риски выражены максимально.</p>`;
  if(r.compulsive.includes(i))extra+=`<p class="small" style="color:#b45309">❗ Компульсивная точка (${v>0?"+":""}${v}): качество проявляется навязчиво, человек не может его «выключить»; обсудите на интервью.</p>`;
  if(i===1&&r.molB)extra+=`<p class="small" style="color:#b45309">⚡ Переменчивость настроения: балл отражает «среднюю температуру», а не стабильное состояние.</p>`;
  if(i===4&&r.molE)extra+=`<p class="small" style="color:#b45309">⚡ Переменчивость активности: периоды подъёма сменяются спадами — планируйте буферы в сроках.</p>`;
  cards+=interpCard(`${s.code}. ${s.name} — ${v>0?"+":""}${v}`,s.pair,v,z,it.d,it.w,extra);});
 const strengths=GRANI_SCALES.filter((s,i)=>r.std[i]>=32).map((s,idx,arr)=>s.name+" ("+(r.std[GRANI_SCALES.indexOf(s)]>0?"+":"")+r.std[GRANI_SCALES.indexOf(s)]+")");
 const risks=GRANI_SCALES.filter((s,i)=>r.std[i]<=-32).map(s=>s.name+" ("+r.std[GRANI_SCALES.indexOf(s)]+")");
 const syn=GRANI_SYNDROMES.filter(s=>r.synIds.includes(s.id));
 let val="";
 if(r.unreliable)val+=`<div class="alertbox red"><b>Ненадёжный профиль:</b> ${r.maybeCount} ответов «Не знаю» (порог — 50). Кандидат отнёсся к тесту формально или плохо знает себя; профиль искажён.</div>`;

function paeiChart(sc){
 const W=760,rowH=64,L=210,T=16,BW=470,H=T+4*rowH+26;

 [35,65].forEach(v=>{const x=L+v/100*BW;
  g+=`<line x1="${x}" y1="${T-6}" x2="${x}" y2="${T+4*rowH}" stroke="#cbd2e0" stroke-dasharray="4 3"/><text x="${x}" y="${T+4*rowH+16}" text-anchor="middle" font-size="10.5" fill="#94a3b8">${v}</text>`;});
 sc.forEach((v,i)=>{const s=PAEI_STYLES[i],yy=T+i*rowH;
  g+=`<text x="14" y="${yy+22}" font-size="22" font-weight="800" fill="${s.color}">${paeiLetter(v,s.code)==="-"?"–":paeiLetter(v,s.code)}</text>
  <text x="46" y="${yy+16}" font-size="12.5" font-weight="700" fill="#1c2333">${s.name}</text>
  <text x="46" y="${yy+31}" font-size="10.5" fill="#6b7385">${s.full}</text>
  <rect x="${L}" y="${yy+6}" width="${BW}" height="20" rx="9" fill="#eef1f6"/>
  <rect x="${L}" y="${yy+6}" width="${Math.max(6,v/100*BW)}" height="20" rx="9" fill="${s.color}"><title>${s.name}: ${v}</title></rect>
  <text x="${L+Math.max(6,v/100*BW)+8}" y="${yy+21}" font-size="12" font-weight="700" fill="#1c2333">${v}</text>`;});
 g+=`<text x="${L}" y="${T+4*rowH+16}" font-size="10.5" fill="#94a3b8">0</text><text x="${L+BW}" y="${T+4*rowH+16}" text-anchor="end" font-size="10.5" fill="#94a3b8">100</text>`;
 return `<svg viewBox="0 0 ${W} ${H}" width="${W}">${g}</svg>`;
}

  cards+=interpCard(`${s.code}. ${s.name} — ${v}`,s.full,v,z,it.d,it.w);});
 return `${reportHead(rec)}

 </div>
 <div class="chartbox"><h3 class="center" style="margin-top:0">Выраженность ролей (0–100)</h3>${paeiChart(r.sc)}</div>

 ${r.deadwood?`<div class="alertbox red"><b>Ни одна роль не выражена</b> (все ниже 35): человек либо прошёл тест формально, либо находится в состоянии выгорания/отстранённости. Обязательно обсудите результат лично.</div>`:""}

// ============================================================ АРХЕТИПЫ: график и отчёт
function archChart(sums){
 const W=680,H=690,cx=340,cy=345,R=[100,175,250],NR=45;
 // позиции: [архетип] → [рука, уровень]; руки: 0=лево,1=верх,2=право,3=низ
 const pos=[[0,0],[0,1],[0,2],[1,0],[1,1],[1,2],[2,0],[2,1],[2,2],[3,0],[3,1],[3,2]];
 const xy=(arm,lv)=>{const r=R[lv];
  return arm===0?[cx-r,cy]:arm===1?[cx,cy-r]:arm===2?[cx+r,cy]:[cx,cy+r];};
 let g=R.map(r=>`<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="#d5dae6" stroke-width="1.5"/>`).join("");
 g+=`<circle cx="${cx}" cy="${cy}" r="${NR-4}" fill="#111827"/><text x="${cx}" y="${cy+5}" text-anchor="middle" font-size="15" font-weight="800" fill="#fff">Я</text>`;
 sums.forEach((v,i)=>{const [arm,lv]=pos[i],[x,y]=xy(arm,lv),b=archBand(v);
  const parts=ARCH_TYPES[i].name.toUpperCase().split(" ");
  const nameTs=parts.length>1
   ?`<tspan x="${x}" dy="-14">${parts[0]}</tspan><tspan x="${x}" dy="11">${parts[1]}</tspan>`
   :`<tspan x="${x}" dy="-8">${parts[0]}</tspan>`;
  g+=`<circle cx="${x}" cy="${y}" r="${NR}" fill="${b[2]}"><title>${ARCH_TYPES[i].name}: ${v} (${b[0]})</title></circle>
  <text x="${x}" y="${y}" text-anchor="middle" font-size="${parts.length>1?9.5:10.5}" font-weight="800" fill="#fff">${nameTs}</text>
  <text x="${x}" y="${y+18}" text-anchor="middle" font-size="13" font-weight="800" fill="#fff">${v}</text>`;});
 return `<svg viewBox="0 0 ${W} ${H}" width="640">${g}</svg>`;
}
function reportArch(rec){
 const r=rec.result;
 const topNames=r.top.map(i=>ARCH_TYPES[i].name).join(", ");
 const mg=ARCH_GROUPS[r.motivation];
 const order=r.sums.map((v,i)=>[v,i]).sort((a,b)=>b[0]-a[0]);
 let cards="";
 order.forEach(([v,i])=>{const t=ARCH_TYPES[i],b=archBand(v);
  if(v>=21)cards+=interpCard(`${t.name} — ${v}`,ARCH_GROUPS[t.group].name,v,[b[0],b[1]],t.d,t.w);});
 const weak=order.filter(([v])=>v<21).map(([v,i])=>ARCH_TYPES[i].name+" ("+v+")").join(", ");
 const gbars=ARCH_GROUPS.map((gr,gi)=>{
  const w=Math.round((r.groups[gi]-6)/24*100);
  return `<div style="margin:7px 0"><div class="small" style="display:flex;justify-content:space-between"><span>${gr.name}</span><b>${r.groups[gi]}</b></div>
  <div style="height:10px;background:#eef1f6;border-radius:99px"><div style="height:10px;width:${Math.max(3,w)}%;background:${gr.color};border-radius:99px"></div></div></div>`;}).join("");
 return `${reportHead(rec)}
 <div class="chartbox"><h3 class="center" style="margin-top:0">Карта архетипов</h3>${archChart(r.sums)}
 <div class="center small" style="margin-top:8px">
  <span class="badge" style="background:#ede9fe;color:#6d28d9">доминирующий 26–30</span>&nbsp;
  <span class="badge" style="background:#ffedd5;color:#c2410c">выраженный 21–25</span>&nbsp;
  <span class="badge z-mid">не выраженный 6–20</span></div></div>
 <div class="sumrow">
  <div class="card center"><h4>Архетип по тесту</h4><div style="font-size:24px;font-weight:800;color:var(--brand)">${topNames}</div>
  <div class="small muted">${r.sums[r.top[0]]} из 30 — ${archBand(r.sums[r.top[0]])[0]}</div></div>
  <div class="card center"><h4>Тип мотивации</h4><div style="font-size:19px;font-weight:800;color:${mg.color}">${mg.name}</div>
  <div class="small muted">${mg.motiv}</div></div>
  <div class="card"><h4>Мотивационные группы (6–30)</h4>${gbars}</div>
 </div>
 ${r.flat?`<div class="alertbox amb"><b>Внимание:</b> ${r.flat}</div>`:""}
 <div class="alertbox grn"><b>Как мотивировать.</b> ${mg.w}</div>
 <h2 class="pagebreak">Выраженные архетипы</h2>${cards}
 ${weak?`<div class="card"><h3>Не выраженные архетипы</h3><p class="small muted">${weak}. Эти стратегии поведения человеку не свойственны — не стройте на них рабочие ожидания и мотивацию.</p></div>`:""}
 <div class="card"><h3>Как использовать результат</h3><p>Ведущий архетип показывает естественную стратегию поведения, тип мотивации — «топливо» человека. Сверяйте с ролью: Правителю нужна зона власти, Творцу — авторство, Герою — вызовы, Славному малому — команда. Конфликт роли и архетипа (например, Искатель на конвейерных задачах) — предсказуемое увольнение через полгода.</p></div>`;
}

const KEY_EMP="hr_local_employees_v1";

const TEST_ORDER=["rez","grani","logika","sale","vovl","paei","arch"];
const TEST_SHORT={rez:"РЕЗ",grani:"ГРАНИ",logika:"IQ",sale:"СЕЙЛ",vovl:"ВОВЛ",paei:"PAEI",arch:"АРХ"};
function empMetric(id,test){
 const r=lastRec(id,test);
 if(r){
  if(test==="rez"){const sc=Object.values(r.hr.scores||{});const t=rezTypology(r.answers);
   return {cls:"z-high",txt:(sc.length?(sc.reduce((a,b)=>a+Number(b),0)/sc.length).toFixed(1):"—")+(t?" "+REZ_TYPOLOGY[t].name.slice(0,6)+".":""),rid:r.id};}
  if(test==="grani"){const st=r.result.std;return {cls:r.result.unreliable?"z-low":"z-high",txt:(r.result.unreliable?"⚠ ":"")+"+"+st.filter(v=>v>=32).length+" / −"+st.filter(v=>v<=-32).length,rid:r.id};}
  if(test==="logika")return {cls:"z-high",txt:"IQ "+r.result.iq,rid:r.id};
  if(test==="sale"){const m={hunter:"хантер",farmer:"фермер",universal:"универсал",weak:"слабый"};
   return {cls:"z-high",txt:Math.round(r.result.sc.reduce((a,b)=>a+b,0)/12)+(r.result.type?" "+m[r.result.type]:""),rid:r.id};}
  if(test==="vovl")return {cls:r.result.index>=6?"z-high":r.result.index>=4?"z-mid":"z-vlow",txt:r.result.index.toFixed(1),rid:r.id};
  if(test==="paei")return {cls:"z-high",txt:r.result.code,rid:r.id};
  if(test==="arch")return {cls:"z-high",txt:ARCH_TYPES[r.result.top[0]].name,rid:r.id};
 }
 const emp=getEmp(id);
 if(emp&&(emp.assigned||[]).includes(test))return {cls:"z-mid",txt:"назначен",rid:null};
 return null;
}

function empPortrait(id){

 if(rr){const t=rezTypology(rr.answers);const sc=Object.values(rr.hr.scores||{});

 if(rg){const st=rg.result.std;
  const s=GRANI_SCALES.filter((x,i)=>st[i]>=32).map(x=>x.name.toLowerCase());
  const w=GRANI_SCALES.filter((x,i)=>st[i]<=-32).map(x=>x.name.toLowerCase());

  parts.push(`<b>Стиль PAEI:</b> код <b>${rp.result.code}</b>, ведущая роль — ${d.name.toLowerCase()}. ${d.high.w.split("Риски")[0].trim()}`);}
 const ra=lastRec(id,"arch");
 if(ra){const mg=ARCH_GROUPS[ra.result.motivation];

 return parts.length?parts.map(p=>`<p style="margin:7px 0">${p}</p>`).join(""):`<p class="muted">Пока нет пройденных тестов — портрет появится после первых результатов.</p>`;

function delEmp(id){
 if(!confirm("Удалить сотрудника? Его результаты останутся в общей истории без привязки."))return;
 setEmployees(employees().filter(e=>e.id!==id));
 const h=histAll();h.forEach(r=>{if(r.empId===id)r.empId=null;});setHistory(h);
 go("employees");
}
function makeInvite(id){
 const tests=[...document.querySelectorAll(".invt:checked")].map(c=>c.value);
 if(!tests.length){alert("Отметьте хотя бы один тест");return;}
 const e=getEmp(id);e.assigned=[...new Set([...(e.assigned||[]),...tests])];saveEmp(e);
 const url=location.href.split("#")[0]+"#emp="+id+"&t="+tests.join(",");
 $("#invitebox").innerHTML=`<label class="f">Ссылка для сотрудника</label>
 <div style="display:flex;gap:8px"><input type="text" id="invurl" value="${esc(url)}" readonly onclick="this.select()">
 <button class="btn sm" onclick="copyInvite()">Копировать</button>
 <a class="btn sm sec" href="${esc(url)}" onclick="setTimeout(()=>location.reload(),50)">Открыть</a></div>
 <p class="small muted" style="margin-top:6px">Отправьте ссылку сотруднику в мессенджер или на почту. Назначенные тесты: ${tests.map(t=>TESTS[t].name).join(", ")}.</p>`;
}
function copyInvite(){
 const inp=$("#invurl");inp.select();
 if(navigator.clipboard&&navigator.clipboard.writeText)navigator.clipboard.writeText(inp.value).then(()=>alert("Ссылка скопирована"));
 else{try{document.execCommand("copy");alert("Ссылка скопирована");}catch(e){alert("Скопируйте вручную (Ctrl+C)");}}
}

function teamEnps(){
 const staff=employees().filter(e=>e.stage==="staff");
 const last=staff.map(e=>lastRec(e.id,"enps")).filter(Boolean);
 if(!last.length)return null;
 const p=last.filter(r=>r.result.cat==="promoter").length,d=last.filter(r=>r.result.cat==="detractor").length;

}

// ---------- анализ резюме ----------
function analyzeResume(text){
 const words=(text.match(/[а-яёa-z]+/gi)||[]).length;
 const mails=text.match(/[\w.+-]+@[\w-]+\.[\w.]+/g)||[];
 const phones=text.match(/(?:\+7|8)[\s(-]*\d{3}[\s)-]*\d{3}[\s-]*\d{2}[\s-]*\d{2}/g)||[];
 const years=[...new Set((text.match(/(?:19|20)\d{2}/g)||[]).map(Number))].sort();
 const ranges=(text.match(/(?:19|20)\d{2}\s*[-–—]\s*(?:(?:19|20)\d{2}|н\.?\s?в|наст)/gi)||[]).length;
 const nums=(text.match(/\d+([.,]\d+)?\s*(%|млн|тыс|₽|руб|шт|клиент|сдел)/gi)||[]).length;
 const cliches=["стрессоустойчив","коммуникабельн","ответственн","командный игрок","быстро обучаем","многозадачн","целеустремл","активная жизненная позиция","легко нахожу общий язык"].filter(c=>text.toLowerCase().includes(c));
 const achieve=(text.match(/увеличил|снизил|вырос|запустил|создал|внедрил|достиг|сократил|повысил|построил|вывел/gi)||[]).length;
 const span=years.length>=2?years[years.length-1]-years[0]:0;
 const avgTenure=ranges>1&&span>0?Math.round(span/ranges*10)/10:null;
 const flags=[],good=[];
 if(words<80)flags.push("Резюме слишком короткое ("+words+" слов) — мало информации для оценки.");
 if(nums===0)flags.push("Нет ни одной цифры-результата (объёмы, %, деньги) — кандидат описывает процесс, а не результат.");
 else if(nums>=4)good.push("Много конкретики: "+nums+" числовых показателей результата.");
 if(achieve>=3)good.push("Есть язык достижений: "+achieve+" глаголов результата (увеличил, внедрил и т. п.).");
 if(achieve===0)flags.push("Нет глаголов достижений — перечислены обязанности, а не результаты.");
 if(cliches.length>=3)flags.push("Много шаблонных клише ("+cliches.join(", ")+") — просите примеры за каждым словом.");
 if(avgTenure!=null&&avgTenure<1.2)flags.push("Частая смена мест: в среднем ~"+avgTenure+" года на месте — уточните причины переходов.");
 if(avgTenure!=null&&avgTenure>=2.5)good.push("Устойчивость: в среднем ~"+avgTenure+" года на одном месте.");
 if(span>=3)good.push("Прослеживаемый стаж: около "+span+" лет ("+years[0]+"–"+years[years.length-1]+").");
 const questions=[];
 if(nums===0)questions.push("Попросите назвать 3 точных показателя своей работы (план/факт, объёмы, динамика).");
 if(avgTenure!=null&&avgTenure<1.5)questions.push("Разберите причину каждого перехода: закономерность важнее формулировок.");
 if(cliches.length)questions.push("По каждому клише («"+(cliches[0]||"")+"…») попросите конкретный пример из практики.");
 questions.push("Сверьте продукт должности из резюме с ответами теста «РЕЗУЛЬТАТИВ» — расхождения обсуждайте на интервью.");
 return {words,mails,phones,years:span,ranges,nums,achieve,cliches,avgTenure,flags,good,questions};
}

function matrixQuadrant(can,want){
 if(can>=6&&want>=6)return["Звезда","#16a34a","Делегируйте сложное, развивайте, удерживайте: деньги + рост + признание."];
 if(can>=6)return["Может, но не хочет","#f59e0b","Компетентен, но демотивирован: диагностическая беседа, новые смыслы/задачи, проверка выгорания."];
 if(want>=6)return["Хочет, но пока не может","#0ea5e9","Мотивирован — вкладывайтесь: обучение, наставник, постепенное усложнение задач."];
 return["Не может и не хочет","#dc2626","Управленческое решение: план исправления с жёстким сроком или расставание."];
}

function matrixChart(people,W){
 W=W||560;const H=W*0.86,L=56,R=W-16,T=30,B=H-46;
 const x=v=>L+(v-1)/9*(R-L),y=v=>B-(v-1)/9*(B-T);
 const mid=5.5;
 let g=`<rect x="${L}" y="${T}" width="${x(mid)-L}" height="${y(mid)-T}" fill="#fff7ed"/>
 <rect x="${x(mid)}" y="${T}" width="${R-x(mid)}" height="${y(mid)-T}" fill="#f0fdf4"/>
 <rect x="${L}" y="${y(mid)}" width="${x(mid)-L}" height="${B-y(mid)}" fill="#fef2f2"/>
 <rect x="${x(mid)}" y="${y(mid)}" width="${R-x(mid)}" height="${B-y(mid)}" fill="#eff6ff"/>
 <line x1="${x(mid)}" y1="${T}" x2="${x(mid)}" y2="${B}" stroke="#cbd2e0"/><line x1="${L}" y1="${y(mid)}" x2="${R}" y2="${y(mid)}" stroke="#cbd2e0"/>
 <rect x="${L}" y="${T}" width="${R-L}" height="${B-T}" fill="none" stroke="#d5dae6"/>
 <text x="${L+8}" y="${T+16}" font-size="10.5" fill="#c2410c">МОЖЕТ, НЕ ХОЧЕТ</text>
 <text x="${R-8}" y="${T+16}" text-anchor="end" font-size="10.5" fill="#15803d">ЗВЕЗДА</text>
 <text x="${L+8}" y="${B-8}" font-size="10.5" fill="#b91c1c">НЕ МОЖЕТ, НЕ ХОЧЕТ</text>
 <text x="${R-8}" y="${B-8}" text-anchor="end" font-size="10.5" fill="#1d4ed8">ХОЧЕТ, НЕ МОЖЕТ</text>
 <text x="${(L+R)/2}" y="${H-10}" text-anchor="middle" font-size="11.5" fill="#475569">ХОЧЕТ (мотивация) →</text>
 <text transform="rotate(-90 16 ${(T+B)/2})" x="16" y="${(T+B)/2}" text-anchor="middle" font-size="11.5" fill="#475569">МОЖЕТ (компетентность) →</text>`;
 [1,5.5,10].forEach(v=>{g+=`<text x="${x(v)}" y="${B+14}" text-anchor="middle" font-size="9.5" fill="#94a3b8">${v}</text>`;});
 people.forEach(p=>{if(!p.matrix)return;
  const ini=p.name.split(" ").slice(0,2).map(w=>w[0]).join("");
  const col=matrixQuadrant(p.matrix.can,p.matrix.want)[1];
  g+=`<circle cx="${x(p.matrix.want)}" cy="${y(p.matrix.can)}" r="15" fill="${col}" opacity=".9"><title>${p.name}: может ${p.matrix.can}, хочет ${p.matrix.want}</title></circle>
  <text x="${x(p.matrix.want)}" y="${y(p.matrix.can)+4}" text-anchor="middle" font-size="10.5" font-weight="800" fill="#fff">${ini}</text>`;});
 return `<svg viewBox="0 0 ${W} ${H}" width="${W}">${g}</svg>`;
}
// ---------- визуальные плитки карточки ----------
function miniBars(vals,min,max,colFn,w,h){
 w=w||130;h=h||34;const bw=w/vals.length-2;
 return `<svg viewBox="0 0 ${w} ${h}" width="${w}" height="${h}">${vals.map((v,i)=>{
  const hh=Math.max(2,(v-min)/(max-min)*(h-4));
  return `<rect x="${i*(bw+2)}" y="${h-hh}" width="${bw}" height="${hh}" rx="1.5" fill="${colFn(v)}"/>`;}).join("")}</svg>`;
}

 else t+=tile("Продуктивность",`<div class="big muted">—</div>`);

 else t+=tile("Личность",`<div class="big muted">—</div>`);

 else t+=tile("Интеллект",`<div class="big muted">—</div>`);
 const rs=lastRec(id,"sale");
 if(rs){const m={hunter:"хантер",farmer:"фермер",universal:"универсал",weak:"слабый"};
  t+=tile("Продажи",miniBars(rs.result.sc,0,100,v=>v>60?"#22c55e":v>40?"#f2a52a":"#ef4444")+`<div class="small muted">средний ${Math.round(rs.result.sc.reduce((a,b)=>a+b,0)/12)}${rs.result.type?" · "+m[rs.result.type]:""}</div>`,rs.id);}
 const rv=lastRec(id,"vovl");
 if(rv){const idx=rv.result.index;

 else t+=tile("Вовлечённость",`<div class="big muted">—</div>`);
 const rp=lastRec(id,"paei");
 if(rp)t+=tile("Стиль PAEI",`<div class="big" style="letter-spacing:2px">${rp.result.code}</div><div class="small muted">ведёт: ${PAEI_STYLES[rp.result.dominant].name}</div>`,rp.id);
 else t+=tile("Стиль PAEI",`<div class="big muted">—</div>`);
 const ra=lastRec(id,"arch");
 if(ra){const mg=ARCH_GROUPS[ra.result.motivation];
  t+=tile("Архетип",`<div class="big" style="font-size:17px">${ra.result.top.map(i=>ARCH_TYPES[i].name).join(", ")}</div><span class="badge" style="background:${mg.color}22;color:${mg.color}">${mg.motiv.split(",")[0]}</span>`,ra.id);}
 else t+=tile("Архетип",`<div class="big muted">—</div>`);
 const re=lastRec(id,"enps");
 if(re){const c=ENPS_CATS[re.result.cat];
  t+=tile("eNPS",`<div class="big">${re.result.score}/10</div><span class="badge ${c[1]}">${c[0]}</span>`,re.id);}
 if(e.matrix){const q=matrixQuadrant(e.matrix.can,e.matrix.want);
  t+=tile("Может-Хочет",`<div class="big" style="font-size:16px;color:${q[1]}">${q[0]}</div><div class="small muted">может ${e.matrix.can} · хочет ${e.matrix.want}</div>`);}
 return `<div class="tiles">${t}</div>`;
}

function empMetric(id,test){
 if(!TESTS[test])return null;
 const r=lastRec(id,test);
 if(r){
  if(test==="rez"){const sc=Object.values(r.hr.scores||{});const t=rezTypology(r.answers);
   return {cls:"z-high",txt:(sc.length?(sc.reduce((a,b)=>a+Number(b),0)/sc.length).toFixed(1):"—")+(t?" "+REZ_TYPOLOGY[t].name.slice(0,6)+".":""),rid:r.id};}
  if(test==="grani"){const st=r.result.std;return {cls:r.result.unreliable?"z-low":"z-high",txt:(r.result.unreliable?"⚠ ":"")+"+"+st.filter(v=>v>=32).length+" / −"+st.filter(v=>v<=-32).length,rid:r.id};}
  if(test==="logika")return {cls:"z-high",txt:"IQ "+r.result.iq,rid:r.id};
  if(test==="sale"){const m={hunter:"хантер",farmer:"фермер",universal:"универсал",weak:"слабый"};
   return {cls:"z-high",txt:Math.round(r.result.sc.reduce((a,b)=>a+b,0)/12)+(r.result.type?" "+m[r.result.type]:""),rid:r.id};}
  if(test==="vovl")return {cls:r.result.index>=6?"z-high":r.result.index>=4?"z-mid":"z-vlow",txt:r.result.index.toFixed(1),rid:r.id};
  if(test==="paei")return {cls:"z-high",txt:r.result.code,rid:r.id};
  if(test==="arch")return {cls:"z-high",txt:ARCH_TYPES[r.result.top[0]].name,rid:r.id};
  if(test==="enps"){const c=ENPS_CATS[r.result.cat];return {cls:c[1],txt:r.result.score+"/10",rid:r.id};}
 }
 const emp=getEmp(id);
 if(emp&&(emp.assigned||[]).includes(test))return {cls:"z-mid",txt:"назначен",rid:null};
 return null;
}
function recSummary(rec){
 if(rec.test==="grani"){const r=rec.result;return (r.unreliable?"⚠ ненадёжный · ":"")+"сильных: "+r.std.filter(v=>v>=32).length+", рисков: "+r.std.filter(v=>v<=-32).length;}
 if(rec.test==="sale"){const m={hunter:"хантер",farmer:"фермер",universal:"универсал",weak:"слабый"};return "средн. "+Math.round(rec.result.sc.reduce((a,b)=>a+b,0)/12)+(rec.result.type?" · "+m[rec.result.type]:"");}
 if(rec.test==="vovl")return "индекс "+rec.result.index.toFixed(1)+" · искренность "+rec.result.battery+"%";
 if(rec.test==="logika")return "IQ "+rec.result.iq+" ("+rec.result.correct+"/80)";
 if(rec.test==="rez"){const sc=Object.values(rec.hr.scores||{});const t=rezTypology(rec.answers);
  return (sc.length?"балл "+(sc.reduce((a,b)=>a+Number(b),0)/sc.length).toFixed(1):"не оценён")+(t?" · "+REZ_TYPOLOGY[t].name:"");}
 if(rec.test==="paei")return "код "+rec.result.code+" · доминирует "+PAEI_STYLES[rec.result.dominant].name;
 if(rec.test==="arch")return rec.result.top.map(i=>ARCH_TYPES[i].name).join(", ")+" · "+ARCH_GROUPS[rec.result.motivation].motiv.split(",")[0].toLowerCase();
 if(rec.test==="enps")return "оценка "+rec.result.score+"/10 · "+ENPS_CATS[rec.result.cat][0].toLowerCase();
 return "";
}

 const ups=[],dels=[];
 cur.forEach((x,id)=>{const j=JSON.stringify(toRow(x));if(shadow.get(id)!==j){ups.push(toRow(x));shadow.set(id,j);}});

}

  sbSend("POST","/rest/v1/"+table,d.ups,"resolution=merge-duplicates"+(wantKeys?",return=representation":""))

 }

 <button onclick="go('history')">История</button>`;

 if(CLOUD&&SESSION)b+=`<button onclick="doLogout()" title="${esc(SESSION.user.email||"")} · ${ROLE_NAMES[MYROLE]||MYROLE}">Выйти</button>`;
 nav.innerHTML=b;
}
function go(screen,arg,arg2){
 if(S.timer){clearInterval(S.timer);S.timer=null;}
 if(CLOUD&&!SESSION&&!EMPMODE){renderLogin();return;}
 if(screen==="hiring"&&!can("hiring")){alert("Раздел «Найм» доступен администратору и HR");return;}
 if(screen==="users"&&!can("users")){alert("Раздел доступен только администратору");return;}
 if(screen==="home")renderHome();
 else if(screen==="tests")renderTests();
 else if(screen==="history")renderHistory();
 else if(screen==="form")renderForm(arg,arg2);
 else if(screen==="result")renderRecord(arg);
 else if(screen==="employees")renderEmployees();
 else if(screen==="emp")renderEmpCard(arg);
 else if(screen==="cabinet")renderCabinet(arg);
 else if(screen==="hiring")renderHiring();
 else if(screen==="vacancy")renderVacancy(arg);
 else if(screen==="onboarding")renderOnboarding();
 else if(screen==="users")renderUsers();
 window.scrollTo(0,0);
}
async function renderUsers(){
 show(`<h1>Пользователи и роли</h1><p class="sub">Загрузка…</p>`);
 let users=[];
 try{users=await sbGet("/rest/v1/app_users?select=*&order=created.asc");}catch(e){show(`<div class="alertbox red">${esc(e.message)}</div>`);return;}
 const rows=users.map(u=>`<tr><td>${esc(u.email||u.user_id)}</td>
  <td>${u.user_id===SESSION.user.id?`<b>${ROLE_NAMES[u.role]}</b> <span class="small muted">(это вы)</span>`:
   `<select onchange="setUserRole('${u.user_id}',this.value)">${Object.keys(ROLE_NAMES).map(r=>`<option value="${r}" ${u.role===r?"selected":""}>${ROLE_NAMES[r]}</option>`).join("")}</select>`}</td>
  <td class="small muted">${new Date(u.created).toLocaleDateString("ru-RU")}</td>
  <td>${u.user_id!==SESSION.user.id?`<button class="btn sm warn" onclick="delUser('${u.user_id}')">Отключить</button>`:""}</td></tr>`).join("");
 show(`<h1>Пользователи и роли</h1>
 <p class="sub">Роли: <b>Администратор</b> — всё, включая роли и очистку данных; <b>HR</b> — вся работа с людьми и наймом; <b>Руководитель</b> — команда, онбординг, отчёты (без раздела «Найм»).</p>
 <div style="overflow-x:auto"><table class="hist"><tr><th>E-mail</th><th>Роль</th><th>Создан</th><th></th></tr>${rows}</table></div>
 <div class="card" style="margin-top:14px"><p class="small muted" style="margin:0">Новый пользователь регистрируется сам на экране входа (кнопка «Зарегистрироваться») и получает роль HR — здесь вы можете её изменить или отключить доступ.</p></div>`);
}
async function setUserRole(uid,role){
 try{await sbSend("PATCH","/rest/v1/app_users?user_id=eq."+uid,{role});alert("Роль обновлена");}
 catch(e){alert(e.message);renderUsers();}
}
async function delUser(uid){
 if(!confirm("Отключить доступ этому пользователю?"))return;
 try{await sbSend("DELETE","/rest/v1/app_users?user_id=eq."+uid);renderUsers();}
 catch(e){alert(e.message);}
}
// --- ссылки сотрудников: в облаке добавляется секретный ключ ---
function makeInvite(id){
 const tests=[...document.querySelectorAll(".invt:checked")].map(c=>c.value);
 if(!tests.length){alert("Отметьте хотя бы один тест");return;}
 const e=getEmp(id);e.assigned=[...new Set([...(e.assigned||[]),...tests])];saveEmp(e);
 const key=CLOUD?(e.inviteKey||""):"";
 if(CLOUD&&!key){alert("Ключ ссылки ещё создаётся в облаке — подождите пару секунд и попробуйте снова.");return;}
 const url=location.href.split("#")[0]+"#emp="+id+(key?"&k="+key:"")+"&t="+tests.join(",");
 $("#invitebox").innerHTML=`<label class="f">Ссылка для сотрудника</label>
 <div style="display:flex;gap:8px"><input type="text" id="invurl" value="${esc(url)}" readonly onclick="this.select()">
 <button class="btn sm" onclick="copyInvite()">Копировать</button></div>
 <p class="small muted" style="margin-top:6px">Ссылка персональная и защищена ключом. Назначенные тесты: ${tests.map(t=>TESTS[t].name).join(", ")}.</p>`;
}
// --- кабинет сотрудника через RPC ---
function loadCabinetData(data){
 EMPMODE=true;EMPKEY=data.key;
 const p=Object.assign({assigned:[],goals:[],meetings:[],log:[],mail:"",phone:"",created:Date.now()},data.person);
 window._empMem=[p];
 window._mem=(data.records||[]).map(r=>({id:r.id,test:r.test,date:Number(r.date),empId:p.id,resp:{},answers:null,result:null,hr:{}}));
 (data.records||[]).forEach(r=>SHADOW.r.set(r.id,"sent"));
 renderNav();
}
function parseHashCloud(){
 const hh=location.hash;
 if(/#join/.test(hh)){
  const tm=hh.match(/t=([a-z,]+)/i);const vm=hh.match(/v=([a-z0-9_]+)/i);
  EMPMODE=true;renderNav();
  renderJoin(tm?tm[1].split(",").filter(x=>TESTS[x]):[],vm?vm[1]:null);
  return true;
 }
 const m=hh.match(/emp=([a-z0-9_]+)/i);
 if(!m)return false;
 const km=hh.match(/k=([a-z0-9-]+)/i);
 if(!km)return false; // без ключа — путь администратора
 EMPMODE=true;renderNav();
 show(`<div class="card center" style="margin-top:60px"><h2>Открываем ваш кабинет…</h2></div>`);
 const tm=hh.match(/t=([a-z,]+)/i);
 rpc("get_cabinet",{p_id:m[1],p_key:km[1],p_tests:tm?tm[1].split(",").filter(x=>TESTS[x]):null})
 .then(data=>{loadCabinetData(data);renderCabinet(data.person.id);})
 .catch(()=>show(`<div class="card center" style="margin-top:40px"><h2>Ссылка недействительна</h2><p class="muted">Запросите новую ссылку у HR.</p></div>`));
 return true;
}
function joinSubmit(testsStr,vacId){
 const name=$("#j_name").value.trim(),mailRaw=$("#j_mail").value.trim(),phoneRaw=$("#j_phone").value.trim();
 if(!name||!mailRaw){alert("Укажите ФИО и e-mail");return;}
 const tests=testsStr?testsStr.split(",").filter(t=>TESTS[t]):[];
 if(!CLOUD){ // локальный режим — прежняя логика
  let emp=employees().find(e=>normMail(e.mail)===normMail(mailRaw)||(normPhone(phoneRaw)&&normPhone(e.phone)===normPhone(phoneRaw)));
  if(emp){emp.assigned=[...new Set([...(emp.assigned||[]),...tests])];saveEmp(emp);logEvent(emp.id,"Вход в кабинет по ссылке");}
  else{emp={id:Date.now().toString(36),name,pos:vacId&&getVac(vacId)?("Кандидат: "+getVac(vacId).title):"",mail:mailRaw,phone:phoneRaw,created:Date.now(),assigned:tests,stage:vacId?"candidate":"staff",vacancyId:vacId||null,candStatus:vacId?"new":null,log:[]};saveEmp(emp);logEvent(emp.id,vacId?"Отклик на должность по ссылке":"Саморегистрация по ссылке");}
  location.hash="#emp="+emp.id;renderCabinet(emp.id);return;
 }
 show(`<div class="card center" style="margin-top:60px"><h2>Секунду, ищем ваш профиль…</h2></div>`);
 rpc("join_person",{p_name:name,p_mail:mailRaw,p_phone:phoneRaw,p_tests:tests,p_vacancy:vacId||null})
 .then(data=>{loadCabinetData(data);location.hash="#emp="+data.person.id+"&k="+data.key;renderCabinet(data.person.id);})
 .catch(e=>{alert("Не получилось: "+e.message);renderJoin(tests,vacId);});
}
// --- посев демо и очистка в облаке ---
function seedIfEmpty(){
 let flag="";try{flag=localStorage.getItem("hr_seeded_v1")||""}catch(e){}
 if(flag==="cleared")return;
 if(CLOUD){
  if(EMPMODE)return;
  if(employees().length===0&&histAll().length===0&&vacancies().length===0)seedDemo(false);
  return;
 }
 if(employees().length===0&&histAll().length===0){seedDemo(false);return;}
 if(!getVac("v1")&&employees().some(e=>e.id==="d1")){
  const el=employees();el.forEach(e=>{if(/^d[1-5]$/.test(e.id)&&!e.stage)e.stage="staff";});setEmployees(el);
  seedDemoExtra(Date.now(),86400000);
 }
}
function wipeAll(){
 if(CLOUD&&!can("wipe")){alert("Очистка доступна только администратору");return;}
 if(!confirm("Удалить ВСЕХ людей, должности и ВСЕ результаты? Действие необратимо."))return;
 setHistory([]);setEmployees([]);setVacancies([]);
 try{localStorage.setItem("hr_seeded_v1","cleared")}catch(e){}
 renderEmployees();
}
// --- старт ---
function init(){
 renderNav();
 if(!CLOUD){
  seedIfEmpty();
  const ok=(function(){try{return parseHash()}catch(e){return false}})();
  if(!ok)renderHome();
  return;
 }
 if(parseHashCloud())return;
 restoreSession().then(ok=>{
  if(ok)return bootAdmin();
  renderLogin();
 }).catch(e=>renderLogin(String(e.message||e)));
}
init();

</script>
